<style>
:root {
  --yellow:#FFE600;--navy:#1D2D50;--navy-dark:#162340;--navy-light:#2A3F6F;--navy-nav:#1a2d50;
  --blue:#3483FA;--blue-bg:#E3F2FD;--green:#00A650;--green-bg:#E8F5E9;
  --red:#E53935;--red-bg:#FFEBEE;--orange:#F57C00;--orange-bg:#FFF3E0;
  --bg:#F0F2F5;--bg-alt:#F8F9FB;--card-bg:#FFFFFF;--ink:#1A1A1A;--text:#333333;
  --muted:#616161;--light:#9E9E9E;--border:#E0E0E0;--border-soft:#EDEEF1;
  --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.10);
  --radius:10px;--radius-sm:6px;--radius-pill:999px;--transition:all 0.2s ease;
  --font:'Proxima Nova','Nunito Sans',system-ui,sans-serif;
  --primary:#1D2D50;--accent:#FFE600;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink)}
a{color:inherit;text-decoration:none}

.page-header{background:var(--navy-nav);padding:20px 48px 22px;border-bottom:3px solid var(--accent)}
.header-brand{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.header-title{font-size:24px;font-weight:800;color:#fff}
.header-title .acc{color:var(--accent)}
.header-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge-nrt{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--radius-pill)}
.badge-ts{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px;padding:2px 8px;border-radius:var(--radius-pill)}

.tabs-bar{background:var(--navy-dark);padding:0 40px;display:flex;gap:2px;overflow-x:auto}
.tab{padding:11px 20px;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;
  border-bottom:3px solid transparent;background:none;border-top:none;border-left:none;border-right:none;
  transition:var(--transition);display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab:hover{color:#fff;background:rgba(255,255,255,.06)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tag-nrt{font-size:9px;background:var(--orange);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700}

.slide{display:none}.slide.active{display:block}
.container{max-width:1320px;margin:0 auto;padding:24px 48px 56px}

.warn-nrt{background:var(--orange-bg);border-left:3px solid var(--orange);border-radius:0 var(--radius) var(--radius) 0;
  padding:10px 16px;margin-bottom:20px;font-size:12px;color:var(--orange);font-weight:600;display:flex;align-items:center;gap:8px}

.sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi-grid-3{grid-template-columns:repeat(3,1fr);max-width:720px}
.kpi-grid-4{grid-template-columns:repeat(4,1fr);max-width:960px}
.kpi-card{background:var(--card-bg);border-radius:var(--radius);padding:15px 18px;
  box-shadow:var(--shadow);border:1px solid var(--border-soft);border-top:3px solid var(--accent)}
.kpi-card.b{border-top-color:var(--blue)}
.kpi-card.g{border-top-color:var(--green)}
.kpi-card.o{border-top-color:var(--orange)}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:800;color:var(--ink);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* Comparaciones */
.cmp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.cmp-card{background:var(--card-bg);border-radius:var(--radius);padding:14px 15px;box-shadow:var(--shadow);border:1px solid var(--border-soft)}
.cmp-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.cmp-ref{font-size:10px;color:var(--light);margin-bottom:8px}
.cmp-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border-soft)}
.cmp-row:last-child{border-bottom:none}
.cmp-lbl{font-size:11px;color:var(--text)}
.cmp-v{font-size:13px;font-weight:700}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--muted)}
.partial-mark{font-size:9px;color:var(--orange);font-weight:700}
.gap-row{background:var(--bg-alt);margin:0 -15px 0;padding:5px 15px;border-top:1px solid var(--border-soft)!important;border-bottom:none!important}
.gap-row:last-child{margin-bottom:-14px}
.gap-lbl{font-weight:700;color:var(--ink)!important;font-size:11px}

/* Charts */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:22px}
.chart-card{background:var(--card-bg);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border-soft)}
.chart-ttl{font-size:11px;font-weight:700;color:var(--ink);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

/* Tablas */
.tables-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tbl-card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border-soft);overflow:hidden}
.tbl-head{padding:11px 14px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center}
.tbl-head-ttl{font-size:12px;font-weight:700;color:var(--ink)}
.tbl-head-sub{font-size:11px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{background:var(--primary);color:#fff;padding:8px 11px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
th.r{text-align:right}
td{padding:7px 11px;border-bottom:1px solid var(--border-soft);font-size:12px;color:var(--ink)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg-alt)}
td.num{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
td.rk{color:var(--muted);font-size:11px;font-weight:700;width:22px}
td.sh{color:var(--blue);font-weight:700;text-align:right}
.item-ttl{display:block;font-size:12px;max-width:270px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-id{display:block;font-size:10px;color:var(--muted)}

.footnote{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.6}

/* BPC */
.bpc-section{margin-top:24px}
.bpc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.bpc-bar-card{background:var(--card-bg);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border-soft)}
.bpc-brand-row{display:grid;grid-template-columns:70px 1fr 80px;align-items:center;gap:8px;margin-bottom:10px}
.bpc-brand-row:last-child{margin-bottom:0}
.bpc-brand-lbl{font-size:11px;font-weight:700;color:var(--ink)}
.bpc-bar-wrap{height:16px;border-radius:4px;overflow:hidden;display:flex;background:var(--border-soft)}
.bpc-bar-exp{background:var(--red);height:100%}
.bpc-bar-near{background:#FFC107;height:100%}
.bpc-bar-cheap{background:var(--green);height:100%}
.bpc-bar-meta{font-size:10px;color:var(--muted);text-align:right;white-space:nowrap}
.bpc-legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.bpc-leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.bpc-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.bpc-avg-tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--radius-pill)}
.bpc-avg-tag.neg{background:var(--red-bg);color:var(--red)}
.bpc-avg-tag.pos{background:var(--green-bg);color:var(--green)}

@media(max-width:900px){
  .container{padding:16px 20px 32px}
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .cmp-grid{grid-template-columns:repeat(2,1fr)}
  .charts-row,.tables-row{grid-template-columns:1fr}
  .page-header{padding:16px 20px}
  .tabs-bar{padding:0 12px}
}
</style>
</head>

function renderBPC(bpc){
  const bars=bpc.brands.map(b=>{
    const pn=100-b.pct_exp-b.pct_cheap;
    const tagCls=b.avg_gap>5?'neg':'pos';
    const tagTxt=(b.avg_gap>=0?'+':'')+b.avg_gap.toFixed(1)+'%';
    return`<div class="bpc-brand-row">
  <span class="bpc-brand-lbl">${b.b}</span>
  <div>
    <div class="bpc-bar-wrap">
      <div class="bpc-bar-exp"   style="width:${b.pct_exp}%"  title="Expensive: ${b.pct_exp}%"></div>
      <div class="bpc-bar-near"  style="width:${pn.toFixed(1)}%" title="Paridad: ${pn.toFixed(1)}%"></div>
      <div class="bpc-bar-cheap" style="width:${b.pct_cheap}%" title="Cheaper: ${b.pct_cheap}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px">
      <span>${b.pct_exp}% caro</span><span>${b.pct_cheap}% más barato</span>
    </div>
  </div>
  <span class="bpc-avg-tag ${tagCls}">${tagTxt} avg</span>
</div>`;
  }).join('');

  // Dropdown options — unique verticals sorted
  const verticals=['Todas',...[...new Set(bpc.top_exp.map(r=>r.v))].sort()];
  const opts=verticals.map(v=>`<option value="${v}">${v}</option>`).join('');

  // Rows with data-v attribute for filtering
  const topRows=bpc.top_exp.map((r,i)=>`<tr data-v="${r.v}">
  <td class="rk bpc-rank">${i+1}</td>
  <td><span style="font-size:10px;font-weight:700;color:var(--red);margin-right:4px">${r.b}</span><span class="item-ttl" style="max-width:240px">${r.t}</span><span style="display:block;font-size:9px;color:var(--muted)">${r.v}</span></td>
  <td class="num neg" style="font-weight:700">+${r.gap.toFixed(1)}%</td>
  <td class="num">$${Math.round(r.meli).toLocaleString('es-AR')}</td>
  <td class="num" style="color:var(--green)">$${Math.round(r.rival).toLocaleString('es-AR')}</td>
  <td style="font-size:11px;color:var(--muted)">${r.rv}</td>
</tr>`).join('');

  return`<div class="bpc-section">
  <div class="sec-label">Competitividad BPC vs Mercado — 5/5 · hora ${bpc.hora} · NRT</div>
  <div class="bpc-grid">
    <div class="bpc-bar-card">
      <div class="chart-ttl" style="margin-bottom:10px">Estado por marca (% ítems)</div>
      <div class="bpc-legend">
        <span class="bpc-leg-item"><span class="bpc-leg-dot" style="background:var(--red)"></span>Caro en MLA</span>
        <span class="bpc-leg-item"><span class="bpc-leg-dot" style="background:#FFC107"></span>Paridad (±5%)</span>
        <span class="bpc-leg-item"><span class="bpc-leg-dot" style="background:var(--green)"></span>Más barato en MLA</span>
      </div>
      ${bars}
    </div>
    <div class="tbl-card">
      <div class="tbl-head">
        <span class="tbl-head-ttl">Ítems expensive</span>
        <select id="bpc-vfilter" onchange="filterBPC(this.value)"
          style="font-size:11px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 8px;background:var(--bg-alt);color:var(--ink)">
          ${opts}
        </select>
      </div>
      <table><thead><tr><th>#</th><th>Producto</th><th class="r">Gap</th><th class="r">MELI</th><th class="r">Rival</th><th>vs</th></tr></thead>
      <tbody id="bpc-tbody">${topRows}</tbody></table>
    </div>
  </div>
  <div class="footnote">Fuente: COMPETITIVE_INTELLIGENCE_ITEM_STATUS_NRT — snapshot hora ${bpc.hora} del 05/05/2026. Expensive = precio MELI &gt; rival +5%. Rivales: Frávega, Megatone, Coto, Oncity, Carrefour.</div>
</div>`;
}

function filterBPC(v){
  const rows=document.querySelectorAll('#bpc-tbody tr');
  let n=1;
  rows.forEach(r=>{
    const show=(v==='Todas'||r.dataset.v===v);
    r.style.display=show?'':'none';
    if(show) r.querySelector('.bpc-rank').textContent=n++;
  });
}

function pct(v,partial){
  if(v===null||v===undefined)return'—';
  const s=(v>=0?'+':'')+v.toFixed(1)+'%';
  return s+(partial?'<span class="partial-mark">*</span>':'');
}
function cls(v,partial){
  if(v===null||v===undefined)return'neu';
  return (v>=0?'pos':'neg')+(partial?' partial-val':'');
}
function itemUrl(id){return`https://articulo.mercadolibre.com.ar/${id.replace('MLA','MLA-')}`;}

function cmpCard(title,metric,deflator){
  const p=metric.partial||false;
  const gNsi=(metric.snsi!=null&&metric.nnsi!=null)?(metric.nnsi-metric.snsi):null;
  const ppFmt=(v,par)=>v==null?'—':((v>=0?'+':'')+v.toFixed(1)+' pp'+(par?'<span class="partial-mark">*</span>':''));
  const dSnmv=deflator&&metric.snmv!=null?((1+metric.snmv/100)/deflator-1)*100:metric.snmv;
  const dNnmv=deflator&&metric.nnmv!=null?((1+metric.nnmv/100)/deflator-1)*100:metric.nnmv;
  const gNmv=(dSnmv!=null&&dNnmv!=null)?(dNnmv-dSnmv):null;
  const nmvLbl=deflator?'Defla':'';
  return`<div class="cmp-card">
<div class="cmp-title">${title}</div>
<div class="cmp-ref">${metric.ref||''}</div>
<div class="cmp-row"><span class="cmp-lbl">Site NMV${nmvLbl?' <span style="font-size:9px;background:var(--blue);color:#fff;padding:1px 4px;border-radius:2px;font-weight:700">'+nmvLbl+'</span>':''}</span><span class="cmp-v ${cls(dSnmv,p)}">${pct(dSnmv,p)}</span></div>
<div class="cmp-row"><span class="cmp-lbl">Site NSI</span><span class="cmp-v ${cls(metric.snsi,p)}">${pct(metric.snsi,p)}</span></div>
<div class="cmp-row"><span class="cmp-lbl">Newsan NMV${nmvLbl?' <span style="font-size:9px;background:var(--blue);color:#fff;padding:1px 4px;border-radius:2px;font-weight:700">'+nmvLbl+'</span>':''}</span><span class="cmp-v ${cls(dNnmv,p)}">${pct(dNnmv,p)}</span></div>
<div class="cmp-row"><span class="cmp-lbl">Newsan NSI</span><span class="cmp-v ${cls(metric.nnsi,p)}">${pct(metric.nnsi,p&&metric.nnsi!=null&&metric.nnsi<0)}</span></div>
<div class="cmp-row gap-row"><span class="cmp-lbl gap-lbl">Gap NMV${nmvLbl?' Defla':''} (NS vs MLA)</span><span class="cmp-v ${cls(gNmv,p&&gNmv!=null&&gNmv<0)}">${ppFmt(gNmv,p)}</span></div>
<div class="cmp-row gap-row" style="margin-top:2px"><span class="cmp-lbl gap-lbl">Gap NSI (NS vs MLA)</span><span class="cmp-v ${cls(gNsi,p&&gNsi!=null&&gNsi<0)}">${ppFmt(gNsi,p)}</span></div>
</div>`;
}

function renderScopeData(d, idx, scope){
  const src = scope==='ce' ? d.ce : d;
  const is_nrt = scope!=='ce' && d.nrt;
  const scopeLbl = scope==='ce' ? ' <span style="font-size:10px;background:#3483FA;color:#fff;padding:1px 6px;border-radius:3px;margin-left:4px">CE</span>' : '';
  const nrtBanner = is_nrt ? `<div class="warn-nrt">⚡ Datos en tiempo real (NRT) — día en curso. Comparaciones marcadas con * son vs días completos y no directamente comparables.</div>` : '';
  const asp_ns=(src.ns.nmv*1e6/src.ns.nsi).toFixed(0);
  const part_nmv=(src.ns.nmv/(src.site.nmv*1000)*100).toFixed(3);
  const part_nsi=(src.ns.nsi/src.site.nsi*100).toFixed(3);
  const scopeRef = scope==='ce' ? 'del CE (HOME ELECTRONICS + TECHNOLOGY)' : 'del total MLA';
  const kpis=`
<div class="kpi-grid kpi-grid-4">
  <div class="kpi-card g"><div class="kpi-lbl">NMV Newsan</div><div class="kpi-val">${src.ns.nmv.toFixed(2)} mm</div><div class="kpi-sub">ARS · ASP $${parseInt(asp_ns).toLocaleString('es-AR')}</div></div>
  <div class="kpi-card g"><div class="kpi-lbl">NSI Newsan</div><div class="kpi-val">${src.ns.nsi.toLocaleString('es-AR')}</div><div class="kpi-sub">Unidades vendidas</div></div>
  <div class="kpi-card o"><div class="kpi-lbl">Part. NMV</div><div class="kpi-val">${part_nmv}%</div><div class="kpi-sub">${scopeRef}</div></div>
  <div class="kpi-card o"><div class="kpi-lbl">Part. NSI</div><div class="kpi-val">${part_nsi}%</div><div class="kpi-sub">${scopeRef}</div></div>
</div>`;
  const comps=`<div class="cmp-grid">
  ${cmpCard('YoY — vs mismo día 2025',{snmv:src.yoy.snmv,snsi:src.yoy.snsi,nnmv:src.yoy.nnmv,nnsi:src.yoy.nnsi,partial:src.yoy.partial,ref:'vs '+d.fecha.replace('2026','2025')},DEFL_YOY)}
  ${cmpCard('MoM — vs fecha doble anterior',{snmv:src.mom.snmv,snsi:src.mom.snsi,nnmv:src.mom.nnmv,nnsi:src.mom.nnsi,partial:src.mom&&src.mom.partial,ref:src.mom.ref})}
  ${cmpCard('vs Día Anterior',{snmv:src.da.snmv,snsi:src.da.snsi,nnmv:src.da.nnmv,nnsi:src.da.nnsi,partial:src.da&&src.da.partial,ref:src.da.ref})}
  ${cmpCard('vs Semana Anterior',{snmv:src.sa.snmv,snsi:src.sa.snsi,nnmv:src.sa.nnmv,nnsi:src.sa.nnsi,partial:src.sa&&src.sa.partial,ref:src.sa.ref})}
</div>`;
  const footnote = is_nrt ? '<div class="footnote">* Comparaciones marcadas con asterisco son vs días completos — no directamente comparables.</div>' : '';
  return`${nrtBanner}
<div class="sec-label">Performance · ${d.label}${scopeLbl}</div>
${kpis}
<div class="sec-label">Comparaciones</div>
${comps}
${footnote}`;
}

  const isNmv = metric==='nmv';
  const isCe  = SCOPE==='ce';
  const d26   = isNmv ? (isCe?CE_NMV_26:NMV_26) : (isCe?CE_NSI_26:NSI_26);
  const d25   = isNmv ? (isCe?CE_NMV_25:NMV_25) : (isCe?CE_NSI_25:NSI_25);
  const unit  = isNmv ? ' bn' : 'k';
  const scope_lbl = isCe ? ' CE' : '';
  const lbl26 = isNmv ? `2026${scope_lbl} (bn ARS)` : `2026${scope_lbl} (k unidades)`;
  const lbl25 = isNmv ? `2025${scope_lbl} (bn ARS)` : `2025${scope_lbl} (k unidades)`;
  return {
    type:'bar',
    data:{
      labels:LABELS,
      datasets:[
        {label:lbl26,data:d26,backgroundColor:d26.map((_,i)=>i===idx?'#FFE600':'rgba(255,230,0,0.4)'),borderColor:d26.map((_,i)=>i===idx?'#E6B800':'rgba(255,230,0,0.5)'),borderWidth:1,borderRadius:4},
        {label:lbl25,data:d25,backgroundColor:d25.map((_,i)=>i===idx?'rgba(29,45,80,0.75)':'rgba(29,45,80,0.25)'),borderColor:'rgba(29,45,80,0.4)',borderWidth:1,borderRadius:4}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{labels:{font:{size:11},color:TICK2}}},
      scales:{
        y:{grid:{color:GRID},ticks:{color:TICK,font:{size:10},callback:v=>v+unit}},
        x:{grid:{display:false},ticks:{color:TICK2,font:{size:11,weight:'bold'}}}
      }
    }
  };
}

function buildPartChart(idx, metric){
  const GRID='#EDEEF1',TICK='#9E9E9E',TICK2='#616161';
  const isCe = SCOPE==='ce';
  const partData = metric==='nmv' ? (isCe?CE_PART:PART) : (isCe?CE_PART_NSI:PART_NSI);
  const maxVal   = isCe ? (metric==='nmv'?5:2.5) : (metric==='nmv'?2:0.6);
  const scopeTag = isCe?' CE':'';
  const lbl      = metric==='nmv' ? `Part. Newsan NMV${scopeTag} (%)` : `Part. Newsan NSI${scopeTag} (%)`;
  return {
    type:'line',
    data:{
      labels:LABELS,
      datasets:[{
        label:lbl, data:partData,
        borderColor:'#00A650',backgroundColor:'rgba(0,166,80,0.08)',fill:true,tension:0.35,
        pointBackgroundColor:partData.map((_,i)=>i===idx?'#00A650':'rgba(0,166,80,0.4)'),
        pointRadius:partData.map((_,i)=>i===idx?7:4),
        pointBorderColor:'#fff',pointBorderWidth:2
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:true,
      plugins:{legend:{labels:{font:{size:11},color:TICK2}}},
      scales:{
        y:{min:0,max:maxVal,grid:{color:GRID},ticks:{color:TICK,font:{size:10},callback:v=>v+'%'}},
        x:{grid:{display:false},ticks:{color:TICK2,font:{size:11}}}
      }
    }
  };
}

function initCharts(idx){
  if(charts['n'+idx])return;
  charts['n'+idx]=new Chart(document.getElementById('cnmv-'+idx).getContext('2d'), buildMainChart(idx,CHART_METRIC));
  charts['p'+idx]=new Chart(document.getElementById('cpart-'+idx).getContext('2d'), buildPartChart(idx,CHART_METRIC));
}

function switchMetric(metric, idx){
  if(CHART_METRIC===metric) return;
  CHART_METRIC=metric;

  // Actualizar botones en todas las slides visibles
  document.querySelectorAll('[id^="btn-nmv-"]').forEach(b=>{
    b.style.background = metric==='nmv'?'var(--primary)':'transparent';
    b.style.color      = metric==='nmv'?'#fff':'var(--primary)';
  });
  document.querySelectorAll('[id^="btn-nsi-"]').forEach(b=>{
    b.style.background = metric==='nsi'?'var(--primary)':'transparent';
    b.style.color      = metric==='nsi'?'#fff':'var(--primary)';
  });

  // Actualizar títulos y charts del tab activo
  const isNmv = metric==='nmv';
  const ttl = document.getElementById('chart-ttl-'+idx);
  const pttl= document.getElementById('part-ttl-'+idx);
  if(ttl)  ttl.textContent  = isNmv ? 'Evolución NMV Site — todas las Fechas Dobles (bn ARS)' : 'Evolución NSI Site — todas las Fechas Dobles (k unidades)';
  if(pttl) pttl.textContent = isNmv ? 'Participación Newsan en NMV (%)' : 'Participación Newsan en NSI (%)';

  // Destruir y recrear los charts del tab activo
  if(charts['n'+idx]){ charts['n'+idx].destroy(); delete charts['n'+idx]; }
  if(charts['p'+idx]){ charts['p'+idx].destroy(); delete charts['p'+idx]; }
  initCharts(idx);
}

function switchScope(scope){
  if(SCOPE===scope) return;
  SCOPE=scope;
  // Actualizar botones de scope
  const btnTotal=document.getElementById('scope-btn-total');
  const btnCe=document.getElementById('scope-btn-ce');
  if(btnTotal){
    btnTotal.style.background=scope==='total'?'rgba(255,255,255,.9)':'transparent';
    btnTotal.style.color=scope==='total'?'var(--navy-dark)':'rgba(255,255,255,.6)';
    btnTotal.style.borderColor=scope==='total'?'rgba(255,255,255,.7)':'rgba(255,255,255,.4)';
  }
  if(btnCe){
    btnCe.style.background=scope==='ce'?'rgba(255,255,255,.9)':'transparent';
    btnCe.style.color=scope==='ce'?'var(--navy-dark)':'rgba(255,255,255,.6)';
    btnCe.style.borderColor=scope==='ce'?'rgba(255,255,255,.7)':'rgba(255,255,255,.4)';
  }
  // Re-renderizar KPIs + comparaciones del tab activo
  const activeTab=document.querySelector('.tab.active');
  const idx=activeTab?parseInt(activeTab.dataset.fd):0;
  const scopeEl=document.getElementById('scope-data-'+idx);
  if(scopeEl) scopeEl.innerHTML=renderScopeData(FECHAS[idx],idx,scope);
  // Actualizar charts
  if(charts['n'+idx]){charts['n'+idx].destroy();delete charts['n'+idx];}
  if(charts['p'+idx]){charts['p'+idx].destroy();delete charts['p'+idx];}
  initCharts(idx);
  // Actualizar títulos de charts
  const ttl=document.getElementById('chart-ttl-'+idx);
  const pttl=document.getElementById('part-ttl-'+idx);
  const isNmv=CHART_METRIC==='nmv';
  const scopeTag=scope==='ce'?' CE':'';
  if(ttl)  ttl.textContent=isNmv?`Evolución NMV${scopeTag} Site — Fechas Dobles (bn ARS)`:`Evolución NSI${scopeTag} Site — Fechas Dobles (k unidades)`;
  if(pttl) pttl.textContent=isNmv?`Participación Newsan NMV${scopeTag} (%)`:`Participación Newsan NSI${scopeTag} (%)`;
}

initCharts(0);
</script>
</body>
</html>
